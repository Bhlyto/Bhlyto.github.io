<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhlyto's Repositories</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      color: #e6edf3;
      margin-bottom: 0.4rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
    }

    #repo-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .repo-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.2s;
    }

    .repo-card:hover {
      border-color: #58a6ff;
    }

    .repo-card.featured {
      border-color: #1f6feb;
    }

    .repo-card.featured:hover {
      border-color: #58a6ff;
    }

    .repo-card a {
      font-size: 1.05rem;
      font-weight: 600;
      color: #58a6ff;
      text-decoration: none;
      word-break: break-word;
    }

    .repo-card a:hover {
      text-decoration: underline;
    }

    .repo-card .summary {
      font-size: 0.9rem;
      color: #c9d1d9;
      line-height: 1.5;
    }

    .repo-card .bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .repo-card .bullets li {
      font-size: 0.85rem;
      color: #8b949e;
      line-height: 1.5;
      padding-left: 1.1rem;
      position: relative;
    }

    .repo-card .bullets li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: #58a6ff;
      font-weight: 700;
    }

    .repo-card .plain-desc {
      font-size: 0.9rem;
      color: #8b949e;
      line-height: 1.5;
      flex: 1;
    }

    #error-message {
      text-align: center;
      color: #f85149;
      font-size: 1rem;
      margin-top: 2rem;
      display: none;
    }

    #loading {
      text-align: center;
      color: #8b949e;
      margin-top: 2rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bhlyto's GitHub Repositories</h1>
    <p>All public repositories</p>
  </header>

  <div id="loading">Loading repositories…</div>
  <div id="error-message">Failed to load repositories. Please try again later.</div>
  <div id="repo-list"></div>

  <script>
    const CURATED = {
      'SPAS-': {
        summary: 'Small Programming Agents System (SPAS) is a local multi-agent workflow runner (Ollama + Python) featuring a desktop GUI and per-run workspace artifacts.',
        bullets: [
          'Designed for both casual and expert users.',
          'Integrates Python and Ollama (local LLM) for code generation, compilation, and execution.',
          'Provides diagnostics, manages dependencies, and supports agent configuration.',
          'Feature-rich GUI for workflow history, package management, and environment setup.'
        ]
      },
      'BHC_SCHEDULER': {
        summary: 'A lightweight job orchestration daemon in C with REST API and optional web dashboard for submitting, tracking, and managing jobs cluster-wide.',
        bullets: [
          'Priority job queue, resource-aware allocation (CPU/RAM/GPU/disk), multi-machine and presimulation workflows.',
          'File management and live job streaming via Server-Sent Events (SSE).',
          'Built-in dashboard, role-based user and API key management, and cross-platform daemon.',
          'Cloud pool (AWS/GCP/Azure), Wake-on-LAN support.'
        ]
      },
      'ShardSim': {
        summary: 'ShardSim (DomainSim) is a distributed multi-fidelity simulation framework with domain-specific learning.',
        bullets: [
          'Central decision core, multi-layer simulation, and adaptive refinement for scientific problems.',
          'Feedback loop for surrogate ML models and domain-specific learning.',
          'Showcases a coarse-to-fine simulation pipeline and distributed orchestration.',
          'Concrete experiments included (e.g. 2D heat diffusion).'
        ]
      }
    };

    function buildCard(name, url, curated, plainDesc) {
      const card = document.createElement('div');
      card.className = curated ? 'repo-card featured' : 'repo-card';

      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = name;
      card.appendChild(link);

      if (curated) {
        const summary = document.createElement('p');
        summary.className = 'summary';
        summary.textContent = curated.summary;
        card.appendChild(summary);

        const ul = document.createElement('ul');
        ul.className = 'bullets';
        curated.bullets.forEach(text => {
          const li = document.createElement('li');
          li.textContent = text;
          ul.appendChild(li);
        });
        card.appendChild(ul);
      } else {
        const desc = document.createElement('p');
        desc.className = 'plain-desc';
        desc.textContent = plainDesc || 'Description not available.';
        card.appendChild(desc);
      }

      return card;
    }

    (async () => {
      const username = 'Bhlyto';
      const listEl = document.getElementById('repo-list');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-message');

      try {
        const allRepos = [];
        let page = 1;
        let repos;

        do {
          const response = await fetch(
            `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
          );

          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }

          repos = await response.json();
          allRepos.push(...repos);
          page++;
        } while (repos.length === 100);

        loadingEl.style.display = 'none';

        if (allRepos.length === 0) {
          listEl.innerHTML = '<p style="text-align:center;color:#8b949e;">No public repositories found.</p>';
          return;
        }

        allRepos.forEach(repo => {
          listEl.appendChild(
            buildCard(repo.name, repo.html_url, CURATED[repo.name], repo.description)
          );
        });
      } catch (err) {
        loadingEl.style.display = 'none';

        // Fallback: GitHub API unavailable — show only the 3 featured repositories.
        listEl.innerHTML = '<p style="text-align:center;color:#8b949e;margin-bottom:1.25rem;">Could not load the full repository list. Showing featured repositories only.</p>';

        const fallbackRepos = [
          { name: 'SPAS-', url: 'https://github.com/Bhlyto/SPAS-' },
          { name: 'BHC_SCHEDULER', url: 'https://github.com/Bhlyto/BHC_SCHEDULER' },
          { name: 'ShardSim', url: 'https://github.com/Bhlyto/ShardSim' }
        ];

        fallbackRepos.forEach(({ name, url }) => {
          listEl.appendChild(buildCard(name, url, CURATED[name], null));
        });

        console.error('Failed to fetch repositories from GitHub API:', err);
      }
    })();
  </script>
</body>
</html>
