<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhlyto's Repositories</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      color: #e6edf3;
      margin-bottom: 0.4rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
    }

    #repo-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .repo-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }

    .repo-card:hover {
      border-color: #58a6ff;
    }

    .repo-card a {
      font-size: 1.05rem;
      font-weight: 600;
      color: #58a6ff;
      text-decoration: none;
      word-break: break-word;
    }

    .repo-card a:hover {
      text-decoration: underline;
    }

    .repo-card p {
      font-size: 0.9rem;
      color: #8b949e;
      line-height: 1.5;
      flex: 1;
    }

    #error-message {
      text-align: center;
      color: #f85149;
      font-size: 1rem;
      margin-top: 2rem;
      display: none;
    }

    #loading {
      text-align: center;
      color: #8b949e;
      margin-top: 2rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bhlyto's GitHub Repositories</h1>
    <p>All public repositories</p>
  </header>

  <div id="loading">Loading repositories…</div>
  <div id="error-message">Failed to load repositories. Please try again later.</div>
  <div id="repo-list"></div>

  <script>
    (async () => {
      const username = 'Bhlyto';
      const listEl = document.getElementById('repo-list');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-message');

      try {
        const allRepos = [];
        let page = 1;
        let repos;

        do {
          const response = await fetch(
            `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
          );

          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }

          repos = await response.json();
          allRepos.push(...repos);
          page++;
        } while (repos.length === 100);

        loadingEl.style.display = 'none';

        if (allRepos.length === 0) {
          listEl.innerHTML = '<p style="text-align:center;color:#8b949e;">No public repositories found.</p>';
          return;
        }

        allRepos.forEach(repo => {
          const card = document.createElement('div');
          card.className = 'repo-card';

          const link = document.createElement('a');
          link.href = repo.html_url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = repo.name;

          const desc = document.createElement('p');
          desc.textContent = repo.description || 'No description provided.';

          card.appendChild(link);
          card.appendChild(desc);
          listEl.appendChild(card);
        });
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        console.error('Failed to fetch repositories:', err);
      }
    })();
  </script>
</body>
</html>
